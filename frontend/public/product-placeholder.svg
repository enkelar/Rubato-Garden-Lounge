<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bgGrad2" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1b2a20"/>
      <stop offset="100%" stop-color="#142219"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgGrad2)"/>
  <rect x="0.5" y="0.5" width="399" height="399" fill="none" stroke="#e4bb85" stroke-opacity="0.25" stroke-width="1"/>

  <!-- fork + knife icon -->
  <g transform="translate(200,175)" fill="none" stroke="#e4bb85" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.85">
    <!-- fork -->
    <g transform="translate(-26,0)">
      <line x1="-8" y1="-45" x2="-8" y2="-20"/>
      <line x1="0" y1="-45" x2="0" y2="-20"/>
      <line x1="8" y1="-45" x2="8" y2="-20"/>
      <path d="M -10 -20 Q 0 -12 10 -20 L 4 10 L 4 45 M 4 10 L -4 10 L -4 45" fill="none"/>
    </g>
    <!-- knife -->
    <g transform="translate(26,0)">
      <path d="M -6 -45 Q 8 -30 6 -5 L 3 -5 L 3 45 L -3 45 L -3 -5 L -6 -5 Z"/>
    </g>
  </g>

  <text x="200" y="270" font-family="Georgia, 'Cormorant Garamond', serif" font-size="20" font-style="italic"
        fill="#e4bb85" fill-opacity="0.8" text-anchor="middle" letter-spacing="1">
    Rubato Garden Lounge
  </text>
</svg>
